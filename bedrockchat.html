  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 20px;
      background: #1a1d27;
      border-bottom: 1px solid #2d3148;
      flex-shrink: 0;
    }

    header h1 {
      font-size: 16px;
      font-weight: 600;
      color: #a78bfa;
      letter-spacing: 0.3px;
    }

    /* model + region selector */
    #model-select, #region-select {
      background: #252836;
      color: #e2e8f0;
      border: 1px solid #3d4166;
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 13px;
      cursor: pointer;
      outline: none;
      transition: border-color 0.2s;
    }
    #model-select { margin-left: auto; }
    #model-select:focus, #region-select:focus { border-color: #7c3aed; }

    /* token bar */
    #token-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 20px;
      background: #13151f;
      border-bottom: 1px solid #2d3148;
      flex-shrink: 0;
    }
    #token-bar label {
      font-size: 12px;
      color: #6b7280;
      white-space: nowrap;
    }
    #token-input {
      flex: 1;
      background: #252836;
      color: #e2e8f0;
      border: 1px solid #3d4166;
      border-radius: 8px;
      padding: 7px 12px;
      font-size: 13px;
      font-family: monospace;
      outline: none;
      transition: border-color 0.2s;
      -webkit-user-select: text;
      user-select: text;
    }
    #token-input::placeholder { color: #4b5563; }
    #token-input:focus { border-color: #7c3aed; }
    #mask-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 16px;
      color: #6b7280;
      padding: 0 4px;
      line-height: 1;
    }

    /* ── Chat area ── */
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .msg {
      display: flex;
      gap: 10px;
      max-width: 780px;
      width: 100%;
    }
    .msg.user  { align-self: flex-end; flex-direction: row-reverse; }
    .msg.assistant { align-self: flex-start; }

    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
    }
    .msg.user .avatar      { background: #7c3aed; }
    .msg.assistant .avatar { background: #1e3a5f; }

    .bubble {
      padding: 10px 14px;
      border-radius: 14px;
      font-size: 14px;
      line-height: 1.6;
      word-break: break-word;
    }
    .msg.user .bubble {
      background: #7c3aed;
      color: #fff;
      border-bottom-right-radius: 4px;
      white-space: pre-wrap;
    }
    .msg.assistant .bubble {
      background: #1e2235;
      color: #e2e8f0;
      border-bottom-left-radius: 4px;
    }

    /* typing indicator */
    .typing span {
      display: inline-block;
      width: 7px; height: 7px;
      background: #6b7280;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40%           { transform: translateY(-6px); }
    }

    /* ── Input bar ── */
    #input-bar {
      display: flex;
      gap: 10px;
      padding: 14px 20px;
      background: #1a1d27;
      border-top: 1px solid #2d3148;
      flex-shrink: 0;
    }

    #user-input {
      flex: 1;
      background: #252836;
      color: #e2e8f0;
      border: 1px solid #3d4166;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 14px;
      resize: none;
      outline: none;
      max-height: 140px;
      transition: border-color 0.2s;
      font-family: inherit;
    }
    #user-input::placeholder { color: #6b7280; }
    #user-input:focus { border-color: #7c3aed; }

    #send-btn {
      background: #7c3aed;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 0 18px;
      font-size: 18px;
      cursor: pointer;
      transition: background 0.2s, opacity 0.2s;
      align-self: flex-end;
      height: 42px;
    }
    #send-btn:hover   { background: #6d28d9; }
    #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* error toast */
    #error-toast {
      display: none;
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      background: #7f1d1d;
      color: #fca5a5;
      padding: 10px 18px;
      border-radius: 8px;
      font-size: 13px;
      z-index: 100;
      max-width: 90vw;
      text-align: center;
    }

    /* token usage pill */
    .token-usage {
      font-size: 11px;
      color: #4b5563;
      margin-top: 4px;
      padding-left: 42px;
    }
    .token-usage span { color: #6b7280; }
    .token-usage .in  { color: #818cf8; }
    .token-usage .out { color: #34d399; }

    /* streaming cursor */
    .cursor::after {
      content: '▋';
      animation: blink 0.7s step-end infinite;
      color: #7c3aed;
    }
    .streaming-tail::after {
      content: '▋';
      animation: blink 0.7s step-end infinite;
      color: #7c3aed;
    }
    @keyframes blink { 50% { opacity: 0; } }
    /* ── Markdown styles ── */
    .bubble.assistant h1,.bubble.assistant h2,.bubble.assistant h3 {
      font-weight: 600; margin: 12px 0 4px; line-height: 1.3;
    }
    .bubble.assistant h1 { font-size: 1.2em; }
    .bubble.assistant h2 { font-size: 1.1em; }
    .bubble.assistant h3 { font-size: 1em; }
    .bubble.assistant p  { margin: 6px 0; }
    .bubble.assistant ul,.bubble.assistant ol { margin: 6px 0 6px 20px; }
    .bubble.assistant li { margin: 2px 0; }
    .bubble.assistant code {
      background: #0d0f1a; color: #a78bfa;
      padding: 1px 5px; border-radius: 4px;
      font-family: 'Fira Code', monospace; font-size: 0.88em;
    }
    .bubble.assistant pre {
      background: #0d0f1a; border: 1px solid #2d3148;
      border-radius: 8px; padding: 12px 14px; margin: 8px 0;
      overflow-x: auto;
    }
    .bubble.assistant pre code {
      background: none; padding: 0; color: #c4b5fd; font-size: 0.85em;
    }
    .bubble.assistant blockquote {
      border-left: 3px solid #4c1d95; margin: 8px 0;
      padding: 4px 12px; color: #9ca3af;
    }
    .bubble.assistant hr { border: none; border-top: 1px solid #2d3148; margin: 10px 0; }
    .bubble.assistant a  { color: #818cf8; text-decoration: underline; }
    .bubble.assistant strong { font-weight: 700; }
    .bubble.assistant em     { font-style: italic; }
    .bubble.assistant table  { border-collapse: collapse; margin: 8px 0; width: 100%; }
    .bubble.assistant th,.bubble.assistant td {
      border: 1px solid #2d3148; padding: 5px 10px; text-align: left;
    }
    .bubble.assistant th { background: #1a1d27; font-weight: 600; }

    /* scrollbar */
    #chat::-webkit-scrollbar { width: 6px; }
    #chat::-webkit-scrollbar-track { background: transparent; }
    #chat::-webkit-scrollbar-thumb { background: #3d4166; border-radius: 3px; }
  </style>
</head>

<div id="token-bar">
  <label for="token-input">Bearer token</label>
  <input id="token-input" type="text" placeholder="Paste your token here…" spellcheck="false" />
  <button id="mask-btn" title="Toggle visibility">👁</button>
</div>

<div id="chat"></div>

<div id="error-toast"></div>

<div id="input-bar">
  <textarea id="user-input" rows="1" placeholder="Message…"></textarea>
  <button id="send-btn" title="Send">➤</button>
</div>

<script>if (top !== self) top.location = self.location;</script>
<script>
  // mask toggle
  document.getElementById('mask-btn').addEventListener('click', () => {
    const inp = document.getElementById('token-input');
    const masked = inp.type === 'password';
    inp.type = masked ? 'text' : 'password';
    document.getElementById('mask-btn').textContent = masked ? '👁' : '🙈';
  });

  const chat     = document.getElementById('chat');
  const input    = document.getElementById('user-input');
  const sendBtn  = document.getElementById('send-btn');
  const modelSel = document.getElementById('model-select');
  const tokenInp = document.getElementById('token-input');
  const errToast = document.getElementById('error-toast');

  const history = [];
  const REGION  = () => document.getElementById('region-select').value;

  // ── helpers ───────────────────────────────────────────────────────────────

  function showError(msg) {
    errToast.textContent = msg;
    errToast.style.display = 'block';
    setTimeout(() => { errToast.style.display = 'none'; }, 6000);
  }

  function appendUserMsg(text) {
    const wrap = document.createElement('div');
    wrap.className = 'msg user';
    wrap.innerHTML = `<div class="avatar">🧑</div><div class="bubble">${escHtml(text)}</div>`;
    chat.appendChild(wrap);
    chat.scrollTop = chat.scrollHeight;
  }

  // Creates an assistant bubble ready for streaming; returns { bubble, addUsage }
  function createAssistantBubble() {
    const wrap = document.createElement('div');
    wrap.className = 'msg assistant';

    const av = document.createElement('div');
    av.className = 'avatar';
    av.textContent = '🤖';

    const bub = document.createElement('div');
    bub.className = 'bubble cursor';

    wrap.appendChild(av);
    wrap.appendChild(bub);
    chat.appendChild(wrap);

    // token usage row (hidden until we have data)
    const usage = document.createElement('div');
    usage.className = 'token-usage';
    usage.style.display = 'none';
    chat.appendChild(usage);

    return {
      bubble: bub,
      finalize(fullText) {
        bub.classList.remove('cursor');
        bub.textContent = fullText;
      },
      showUsage(inp, out, total) {
        usage.innerHTML =
          `<span class="in">↑ ${inp} in</span> · <span class="out">↓ ${out} out</span> · <span>${total} total tokens</span>`;
        usage.style.display = 'block';
      }
    };
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ── Minimal Markdown renderer ─────────────────────────────────────────────
  function renderMd(md) {
    let s = escHtml(md);

    // fenced code blocks
    s = s.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) =>
      `<pre><code class="lang-${lang}">${code.trimEnd()}</code></pre>`);

    // inline code
    s = s.replace(/`([^`]+)`/g, '<code>$1</code>');

    // headings
    s = s.replace(/^### (.+)$/gm, '<h3>$1</h3>');
    s = s.replace(/^## (.+)$/gm,  '<h2>$1</h2>');
    s = s.replace(/^# (.+)$/gm,   '<h1>$1</h1>');

    // blockquote
    s = s.replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>');

    // hr
    s = s.replace(/^---+$/gm, '<hr>');

    // bold / italic
    s = s.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
    s = s.replace(/\*\*(.+?)\*\*/g,     '<strong>$1</strong>');
    s = s.replace(/\*(.+?)\*/g,         '<em>$1</em>');
    s = s.replace(/__(.+?)__/g,         '<strong>$1</strong>');
    s = s.replace(/_(.+?)_/g,           '<em>$1</em>');

    // links — only allow http/https URLs
    s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, (_, text, url) => {
      const safe = /^https?:\/\//i.test(url.trim()) ? url.trim() : '#';
      return `<a href="${safe}" target="_blank" rel="noopener noreferrer">${text}</a>`;
    });

    // tables (simple)
    s = s.replace(/((?:^[|].+[|]\n?)+)/gm, (table) => {
      const rows = table.trim().split('\n').filter(r => !/^\|[-| :]+\|$/.test(r.trim()));
      const html = rows.map((r, i) => {
        const cells = r.split('|').slice(1, -1).map(c => c.trim());
        const tag   = i === 0 ? 'th' : 'td';
        return '<tr>' + cells.map(c => `<${tag}>${c}</${tag}>`).join('') + '</tr>';
      }).join('');
      return `<table>${html}</table>`;
    });

    // unordered lists
    s = s.replace(/((?:^[ \t]*[-*+] .+\n?)+)/gm, block => {
      const items = block.trim().split('\n')
        .map(l => `<li>${l.replace(/^[ \t]*[-*+] /, '')}</li>`).join('');
      return `<ul>${items}</ul>`;
    });

    // ordered lists
    s = s.replace(/((?:^[ \t]*\d+\. .+\n?)+)/gm, block => {
      const items = block.trim().split('\n')
        .map(l => `<li>${l.replace(/^[ \t]*\d+\. /, '')}</li>`).join('');
      return `<ol>${items}</ol>`;
    });

    // paragraphs — wrap double-newline separated blocks not already tagged
    s = s.split(/\n{2,}/).map(block => {
      block = block.trim();
      if (!block) return '';
      if (/^<(h[1-6]|ul|ol|pre|blockquote|hr|table)/.test(block)) return block;
      return `<p>${block.replace(/\n/g, '<br>')}</p>`;
    }).join('\n');

    return s;
  }

  // Auto-resize textarea
  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 140) + 'px';
  });

  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  sendBtn.addEventListener('click', sendMessage);

  // ── send ──────────────────────────────────────────────────────────────────

  async function sendMessage() {
    const text  = input.value.trim();
    const token = tokenInp.value.trim();
    const model = modelSel.value;

    if (!text) return;
    if (!token) { showError('Paste your Bearer token first.'); return; }

    appendUserMsg(text);
    history.push({ role: 'user', content: [{ text }] });

    input.value = '';
    input.style.height = 'auto';
    sendBtn.disabled = true;

    const { bubble, finalize, showUsage } = createAssistantBubble();
    chat.scrollTop = chat.scrollHeight;

    try {
      const { fullText, usage } = await streamBedrock(model, token, history, (chunk) => {
        // Render complete lines as markdown, keep the incomplete last line as plain text
        const lastNewline = chunk.lastIndexOf('\n');
        if (lastNewline === -1) {
          // no complete line yet — plain text + cursor
          bubble.innerHTML = escHtml(chunk);
        } else {
          const complete   = chunk.slice(0, lastNewline);
          const incomplete = chunk.slice(lastNewline + 1);
          bubble.innerHTML = renderMd(complete) +
            (incomplete ? `<span class="streaming-tail">${escHtml(incomplete)}</span>` : '');
        }
        chat.scrollTop = chat.scrollHeight;
      });

      const reply = fullText.trim() || '(empty response)';
      bubble.classList.remove('cursor');
      bubble.innerHTML = renderMd(reply);
      history.push({ role: 'assistant', content: [{ text: reply }] });

      if (usage) {
        showUsage(usage.inputTokens ?? '?', usage.outputTokens ?? '?',
                  (usage.inputTokens ?? 0) + (usage.outputTokens ?? 0));
      }
    } catch (err) {
      bubble.classList.remove('cursor');
      bubble.style.color = '#f87171';
      bubble.textContent = err.message || 'Request failed.';
      showError(err.message || 'Request failed.');
    } finally {
      sendBtn.disabled = false;
      input.focus();
    }
  }

  // ── Bedrock converseStream ────────────────────────────────────────────────
  // Parses AWS event-stream frames incrementally as bytes arrive.
  // Each frame: [total_len:4][headers_len:4][prelude_crc:4][headers][payload][crc:4]

  async function streamBedrock(modelId, bearerToken, messages, onChunk) {
    const endpoint =
      `https://bedrock-runtime.${REGION()}.amazonaws.com/model/${encodeURIComponent(modelId)}/converse-stream`;

    const res = await fetch(endpoint, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${bearerToken}`
      },
      body: JSON.stringify({
        messages,
        inferenceConfig: { maxTokens: 4096, temperature: 0.7 }
      })
    });

    if (!res.ok) {
      const errText = await res.text().catch(() => res.statusText);
      throw new Error(`Bedrock ${res.status}: ${errText}`);
    }

    const reader  = res.body.getReader();
    const dec     = new TextDecoder();
    let buf       = new Uint8Array(0);
    let fullText  = '';
    let usage     = null;

    function concat(a, b) {
      const out = new Uint8Array(a.length + b.length);
      out.set(a); out.set(b, a.length);
      return out;
    }

    function u32(arr, off) {
      return ((arr[off] << 24) | (arr[off+1] << 16) | (arr[off+2] << 8) | arr[off+3]) >>> 0;
    }

    // Extract JSON objects from a string by brace-matching
    function extractJSON(str) {
      const results = [];
      let i = 0;
      while (i < str.length) {
        const start = str.indexOf('{', i);
        if (start === -1) break;
        let depth = 0, j = start;
        while (j < str.length) {
          if (str[j] === '{') depth++;
          else if (str[j] === '}') { if (--depth === 0) break; }
          j++;
        }
        try { results.push(JSON.parse(str.slice(start, j + 1))); } catch {}
        i = j + 1;
      }
      return results;
    }

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf = concat(buf, value);

      // Drain all complete frames from buf
      while (buf.length >= 12) {
        const totalLen   = u32(buf, 0);
        const headersLen = u32(buf, 4);

        if (totalLen < 16 || totalLen > 1_000_000) { buf = new Uint8Array(0); break; }
        if (buf.length < totalLen) break; // frame not fully received yet

        const payloadStart = 12 + headersLen;
        const payloadEnd   = totalLen - 4;
        const frameStr     = dec.decode(buf.slice(payloadStart, payloadEnd));
        buf                = buf.slice(totalLen); // advance past this frame

        for (const evt of extractJSON(frameStr)) {
          if (evt.delta?.text) {
            fullText += evt.delta.text;
            onChunk(fullText);           // ← renders each chunk immediately
          }
          if (evt.usage?.inputTokens !== undefined) {
            usage = evt.usage;
          }
        }
      }
    }

    return { fullText, usage };
  }
</script>
